# Configuration nginx pour le VPS
# Copier dans /etc/nginx/sites-available/surf-app
# Puis : sudo ln -s /etc/nginx/sites-available/surf-app /etc/nginx/sites-enabled/
# Puis : sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name votre-domaine.com www.votre-domaine.com;

    # Redirect HTTP → HTTPS (décommenter après avoir obtenu le certificat Let's Encrypt)
    # return 301 https://$host$request_uri;

    # Frontend (fichiers statiques buildés)
    root /var/www/surf-app;
    index index.html;

    # Cache pour les assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API vers FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Docs FastAPI (optionnel, à désactiver en prod)
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
    }

    # React Router SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}

